[build]
builder = "nixpacks"
buildCommand = "cd backend && NODE_ENV=development npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "cd backend && npx prisma migrate deploy && node dist/src/main"
healthcheckPath = "/api"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
