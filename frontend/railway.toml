[build]
builder = "nixpacks"
buildCommand = "rm -f package-lock.json && NODE_ENV=development npm install && npm run build --workspace=frontend"

[deploy]
startCommand = "npm run start --workspace=frontend"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
